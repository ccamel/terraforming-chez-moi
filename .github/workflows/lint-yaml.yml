name: Lint / YAML

on:
  push:
    branches: [main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
  workflow_dispatch:

concurrency:
  group: lint-yaml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint yaml files
        uses: ibiqlik/action-yamllint@v3.1.1
