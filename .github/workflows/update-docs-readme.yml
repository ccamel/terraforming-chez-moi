name: Docs / Update README

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-docs-readme.yml'
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/*.hcl'
      - 'docker/**'
      - '**/*.tftpl'
      - 'ansible/**'
      - '.github/scripts/**'
      - '.github/python/requirements.txt'
      - '.terraform-docs.yml'
      - 'justfile'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-docs-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-update-readme:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.TERRAFORM_DOC_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: '1.42.4'

      - name: Install documentation dependencies
        run: |
          python3 -m venv .venv-docs
          . .venv-docs/bin/activate
          python3 -m pip install --disable-pip-version-check -r .github/python/requirements.txt

      - name: Generate Terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          output-file: README.md
          output-method: inject
          output-format: markdown
          git-push: 'false'

      # terraform-docs/gh-actions runs as a Docker action and can leave .git
      # objects owned by root, which breaks the later auto-commit step.
      - name: Restore Git metadata ownership after terraform-docs
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.git"


      - name: Generate Just recipes
        run: |
          echo "📝 Generating Just recipes"

          awk '
          /<!-- BEGIN_JUST_RECIPES -->/ {
              print
              print "``` text"
              system("just -l")
              print "```"
              skip = 1
              next
          }
          /<!-- END_JUST_RECIPES -->/ {
              skip = 0
          }
          !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Generate deployed services overview
        run: |
          . .venv-docs/bin/activate
          python3 .github/scripts/render_readme_overview.py README.md

      - name: Generate built Docker images section
        run: |
          . .venv-docs/bin/activate
          python3 .github/scripts/render_readme_docker_images.py README.md

      - name: Prettify README.md
        run: |
          echo "📝 Prettifying README.md"
          npx prettier@3.0.3 README.md --write

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'docs(README): update documentation'
          commit_author: ${{ vars.GIT_AUTHOR_NAME }} <${{ vars.GIT_AUTHOR_EMAIL }}>
          commit_user_name: ${{ vars.GIT_AUTHOR_NAME }}
          commit_user_email: ${{ vars.GIT_AUTHOR_EMAIL }}
